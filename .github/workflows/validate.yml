name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skill package
        run: |
          test -f skills/delegate-coding-to-grok/SKILL.md
          test -f skills/delegate-coding-to-grok-doctor/SKILL.md
          test -f plugins/delegate-coding-to-grok/skills/delegate/SKILL.md
          test -f plugins/delegate-coding-to-grok/skills/doctor/SKILL.md
          test -f plugins/delegate-coding-to-grok/.claude-plugin/plugin.json
          test -f .claude-plugin/marketplace.json
          grep -q '^name: delegate-coding-to-grok$' skills/delegate-coding-to-grok/SKILL.md
          grep -q '^name: delegate-coding-to-grok-doctor$' skills/delegate-coding-to-grok-doctor/SKILL.md
          grep -q '^name: delegate$' plugins/delegate-coding-to-grok/skills/delegate/SKILL.md
          grep -q '^name: doctor$' plugins/delegate-coding-to-grok/skills/doctor/SKILL.md
          grep -q '^description: ' skills/delegate-coding-to-grok/SKILL.md
          cmp \
            <(tail -n +5 skills/delegate-coding-to-grok/SKILL.md) \
            <(tail -n +5 plugins/delegate-coding-to-grok/skills/delegate/SKILL.md)
      - name: Validate JSON
        run: |
          python3 -m json.tool .claude-plugin/marketplace.json >/dev/null
          python3 -m json.tool plugins/delegate-coding-to-grok/.claude-plugin/plugin.json >/dev/null
      - name: Test installer
        run: |
          CLAUDE_SKILLS_DIR="$RUNNER_TEMP/skills" ./install.sh
          test -f "$RUNNER_TEMP/skills/delegate-coding-to-grok/SKILL.md"
